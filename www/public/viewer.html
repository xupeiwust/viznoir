<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>parapilot 3D Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: system-ui, sans-serif; overflow: hidden; }
  #canvas-container { width: 100vw; height: 100vh; }
  #controls {
    position: fixed; top: 12px; left: 12px; z-index: 10;
    background: rgba(26,26,46,0.9); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 12px; font-size: 13px; max-width: 280px;
  }
  #controls h3 { font-size: 14px; margin-bottom: 8px; color: #60a5fa; }
  #controls label { display: block; margin: 6px 0 2px; color: #9ca3af; font-size: 12px; }
  #controls select, #controls input[type="file"] {
    width: 100%; padding: 4px 6px; background: #2a2a4e; color: #e0e0e0;
    border: 1px solid rgba(255,255,255,0.15); border-radius: 4px; font-size: 12px;
  }
  #status {
    position: fixed; bottom: 12px; left: 12px; z-index: 10;
    background: rgba(26,26,46,0.9); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px; padding: 8px 12px; font-size: 11px; color: #6b7280;
  }
  #drop-zone {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100;
    background: rgba(26,26,46,0.95); display: none; align-items: center; justify-content: center;
    font-size: 24px; color: #60a5fa; border: 3px dashed #60a5fa;
  }
  #drop-zone.active { display: flex; }
  .btn {
    display: inline-block; margin-top: 8px; padding: 4px 10px; font-size: 12px;
    background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer;
  }
  .btn:hover { background: #2563eb; }
</style>
</head>
<body>
<div id="canvas-container"></div>

<div id="controls">
  <h3>parapilot 3D Viewer</h3>
  <label for="file-input">Load glTF/glB</label>
  <input type="file" id="file-input" accept=".gltf,.glb,.glTF,.glB">
  <label for="bg-select">Background</label>
  <select id="bg-select">
    <option value="#1a1a2e">Dark</option>
    <option value="#ffffff">White</option>
    <option value="#2d3748">Slate</option>
    <option value="#0f172a">Navy</option>
  </select>
  <label>Controls</label>
  <div style="font-size:11px; color:#6b7280; line-height:1.6">
    Left-drag: Rotate<br>
    Right-drag: Pan<br>
    Scroll: Zoom<br>
    Double-click: Reset view
  </div>
  <button class="btn" id="reset-btn">Reset Camera</button>
  <button class="btn" id="wireframe-btn">Wireframe</button>
</div>

<div id="status">Ready — drop or load a .glb file</div>
<div id="drop-zone">Drop glTF/glB file here</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const container = document.getElementById('canvas-container');
const status = document.getElementById('status');
const bgSelect = document.getElementById('bg-select');
const fileInput = document.getElementById('file-input');
const resetBtn = document.getElementById('reset-btn');
const wireframeBtn = document.getElementById('wireframe-btn');
const dropZone = document.getElementById('drop-zone');

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color('#1a1a2e');

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
camera.position.set(3, 2, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// Lighting (3-point)
const keyLight = new THREE.DirectionalLight(0xffffff, 1.5);
keyLight.position.set(5, 8, 5);
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x8888ff, 0.5);
fillLight.position.set(-5, 3, -2);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xffffff, 0.3);
rimLight.position.set(0, -3, -5);
scene.add(rimLight);

scene.add(new THREE.AmbientLight(0x404040, 0.5));

// Grid
const grid = new THREE.GridHelper(10, 20, 0x333366, 0x222244);
scene.add(grid);

let currentModel = null;
let isWireframe = false;

function loadGLTF(url) {
  status.textContent = 'Loading...';
  const loader = new GLTFLoader();
  loader.load(url, (gltf) => {
    if (currentModel) scene.remove(currentModel);
    currentModel = gltf.scene;
    scene.add(currentModel);

    // Auto-fit camera
    const box = new THREE.Box3().setFromObject(currentModel);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const dist = maxDim * 2;

    camera.position.set(center.x + dist * 0.6, center.y + dist * 0.4, center.z + dist * 0.8);
    controls.target.copy(center);
    controls.update();

    const verts = countVertices(currentModel);
    status.textContent = `Loaded: ${verts.toLocaleString()} vertices, bounds: ${size.x.toFixed(2)} x ${size.y.toFixed(2)} x ${size.z.toFixed(2)}`;
  }, (progress) => {
    if (progress.total) {
      const pct = Math.round(progress.loaded / progress.total * 100);
      status.textContent = `Loading... ${pct}%`;
    }
  }, (error) => {
    status.textContent = `Error: ${error.message}`;
    console.error(error);
  });
}

function loadFile(file) {
  const url = URL.createObjectURL(file);
  loadGLTF(url);
}

function countVertices(obj) {
  let count = 0;
  obj.traverse((child) => {
    if (child.isMesh && child.geometry) {
      count += child.geometry.attributes.position?.count || 0;
    }
  });
  return count;
}

// URL parameter support: ?file=path/to/model.glb
const params = new URLSearchParams(window.location.search);
const fileParam = params.get('file');
if (fileParam) loadGLTF(fileParam);

// Events
fileInput.addEventListener('change', (e) => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

bgSelect.addEventListener('change', (e) => {
  scene.background = new THREE.Color(e.target.value);
});

resetBtn.addEventListener('click', () => {
  if (currentModel) {
    const box = new THREE.Box3().setFromObject(currentModel);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const dist = maxDim * 2;
    camera.position.set(center.x + dist * 0.6, center.y + dist * 0.4, center.z + dist * 0.8);
    controls.target.copy(center);
    controls.update();
  }
});

wireframeBtn.addEventListener('click', () => {
  isWireframe = !isWireframe;
  if (currentModel) {
    currentModel.traverse((child) => {
      if (child.isMesh) child.material.wireframe = isWireframe;
    });
  }
  wireframeBtn.textContent = isWireframe ? 'Solid' : 'Wireframe';
});

// Drag & drop
document.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('active'); });
document.addEventListener('dragleave', () => { dropZone.classList.remove('active'); });
document.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (file && (file.name.endsWith('.glb') || file.name.endsWith('.gltf'))) loadFile(file);
});

// Double-click reset
renderer.domElement.addEventListener('dblclick', () => resetBtn.click());

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animate
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
