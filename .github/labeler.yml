# Auto-label PRs based on file paths
# Used by .github/workflows/pr-quality.yml

engine:
  - changed-files:
    - any-glob-to-any-file: 'src/viznoir/engine/**'

core:
  - changed-files:
    - any-glob-to-any-file: 'src/viznoir/core/**'

tools:
  - changed-files:
    - any-glob-to-any-file: 'src/viznoir/tools/**'

pipeline:
  - changed-files:
    - any-glob-to-any-file: 'src/viznoir/pipeline/**'

context:
  - changed-files:
    - any-glob-to-any-file: 'src/viznoir/context/**'

animation:
  - changed-files:
    - any-glob-to-any-file: 'src/viznoir/anim/**'

tests:
  - changed-files:
    - any-glob-to-any-file: 'tests/**'

documentation:
  - changed-files:
    - any-glob-to-any-file:
      - 'docs/**'
      - '*.md'
      - 'paper/**'

ci:
  - changed-files:
    - any-glob-to-any-file: '.github/**'

www:
  - changed-files:
    - any-glob-to-any-file: 'www/**'
