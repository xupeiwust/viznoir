name: PR Quality

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label-size:
    name: Size Label
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Label PR by size
        uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size/XS'
          xs_max_size: 10
          s_label: 'size/S'
          s_max_size: 50
          m_label: 'size/M'
          m_max_size: 200
          l_label: 'size/L'
          l_max_size: 500
          xl_label: 'size/XL'
          fail_if_xl: false
          message_if_xl: |
            This PR is very large (XL). Consider breaking it into smaller PRs.

  label-type:
    name: Type Label
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml

  template-check:
    name: PR Template
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR template
        uses: actions/github-script@v8
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const errors = [];

            // Extract section content between headings
            const descMatch = body.match(/## Description\s*([\s\S]*?)(?=\n## |$)/);
            if (!descMatch || descMatch[1].trim() === '' || descMatch[1].includes('<!-- What does this PR do?')) {
              errors.push('**Description** section is missing or not filled out');
            }

            const testMatch = body.match(/## Test Plan\s*([\s\S]*?)(?=\n## |$)/);
            if (!testMatch || testMatch[1].trim() === '' || testMatch[1].includes('<!-- How was this tested?')) {
              errors.push('**Test Plan** section is missing or not filled out');
            }
            if (errors.length > 0) {
              const msg = [
                '### PR Template Incomplete',
                '',
                'Please fill out the PR template before this PR can be merged:',
                '',
                ...errors.map(e => '- ' + e),
                '',
                '---',
                '*Edit the PR description to fix this.*'
              ].join('\n');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: msg
              });
              core.setFailed('PR template not filled out: ' + errors.join(', '));
            }
