name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['www/**', '*.md']
  pull_request:
    branches: [main]
    paths-ignore: ['www/**', '*.md']

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Type check (mypy)
        run: mypy src/parapilot/ --ignore-missing-imports

      - name: Test (pytest)
        run: pytest --cov=parapilot --cov-report=term-missing -q
