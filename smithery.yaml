name: parapilot
description: Headless CAE post-processing MCP server for AI coding assistants. Visualize CFD/FEA simulation results through 16 tools — render, slice, contour, clip, streamlines, cinematic, compare, preview_3d, and more.
vendor: kimimgo
sourceUrl: https://github.com/kimimgo/parapilot
homepage: https://kimimgo.github.io/parapilot
license: MIT
tags:
  - vtk
  - cfd
  - cae
  - visualization
  - simulation
  - post-processing
  - headless-rendering
  - engineering
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      PARAPILOT_DATA_DIR:
        type: string
        description: Restrict file access to this directory (security sandbox)
      PARAPILOT_OUTPUT_DIR:
        type: string
        default: /output
        description: Output directory for rendered images
      PARAPILOT_RENDER_BACKEND:
        type: string
        enum: [gpu, cpu, auto]
        default: gpu
        description: Rendering backend (gpu=EGL, cpu=OSMesa)
    required: []
  commandFunction: |-
    (config) => ({
      command: 'mcp-server-parapilot',
      env: {
        ...(config.PARAPILOT_DATA_DIR && { PARAPILOT_DATA_DIR: config.PARAPILOT_DATA_DIR }),
        ...(config.PARAPILOT_OUTPUT_DIR && { PARAPILOT_OUTPUT_DIR: config.PARAPILOT_OUTPUT_DIR }),
        ...(config.PARAPILOT_RENDER_BACKEND && { PARAPILOT_RENDER_BACKEND: config.PARAPILOT_RENDER_BACKEND }),
      }
    })
